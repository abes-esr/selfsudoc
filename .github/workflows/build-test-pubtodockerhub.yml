name: "build-test-pubtodockerhub"

env:
  DOCKERHUB_IMAGE_PREFIX: abesesr/selfsudoc

on:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.properties'
  workflow_dispatch:

jobs:
  build-test-pubtodockerhub:
    if: github.event_name != 'pull_request'  && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:

      - name: "Build: checkout source code"
        uses: actions/checkout@v6

      - name: "Push: prepare version from git tags/branchs"
        id: docker_tag_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE_PREFIX }}
          flavor: |
            latest=auto
            suffix=-batch

      - name: "Push: login to DockerHub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.docker_tag_meta.outputs.tags }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKERHUB_IMAGE_PREFIX }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
