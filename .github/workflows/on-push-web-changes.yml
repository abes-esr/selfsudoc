name: "on-push-web-changes"

on:
  push:
    paths:
      - 'Dockerfile'
      - 'ExportsLibreService/**'
      - 'Utils/**'
      - 'Connection/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  on-push-web-changes:
    uses: "./.github/workflows/build-pubtodockerhub.yml"
    with:
      target: front
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
